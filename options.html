<!DOCTYPE html>
<html>
<head>
  <title>Meet Recorder Setup</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; text-align: center; }
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h2> Microphone Permission Required</h2>
    <p>To record your own voice during Google Meet sessions, this extension needs microphone access.</p>
    <button id="grant-mic">Grant Microphone Permission</button>
    <p id="status"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
